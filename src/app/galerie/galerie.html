<section class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-6">
    
    <div appScrollReveal class="flex flex-col items-center text-center py-8 mb-12">
        <h2 class="text-3xl font-black tracking-widest uppercase text-slate-900 mb-4">Galerie</h2>
        <div class="relative w-40 h-[1px] bg-gray-200">
            <div class="absolute left-1/2 -translate-x-1/2 -top-[1.5px] h-[4px] w-12 bg-orange-400 rounded-full"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (photo of photos(); track $index; let i = $index) {
        <div
            appScrollReveal 
            [style.transition-delay]="(i % 3) * 150 + 'ms'" 
            class="relative group overflow-hidden rounded-xl shadow-lg aspect-[4/3] bg-gray-950 cursor-pointer" 
             (click)="openLightbox(i)">
          
          <img [src]="photo.thumb" 
               [alt]="photo.alt" 
               class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">

          <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm border-2 border-white/40 scale-50 group-hover:scale-100 transition-transform duration-500 delay-100">
              <i class="pi pi-eye text-3xl text-white"></i> 
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>

@if (isLightboxOpen()) {
  <div class="fixed inset-0 bg-black/95 z-[10000] flex flex-col backdrop-blur-sm"
       (click)="closeLightbox()">
    
    <button (click)="closeLightbox()" 
            class="fixed top-6 right-8 text-white/70 hover:text-white text-5xl transition-all cursor-pointer z-[10001] p-2 hover:scale-110">
      ✕
    </button>

    <div class="flex-1 flex items-center justify-center p-4 md:p-12 relative" (click)="$event.stopPropagation()">
      
      <button (click)="prevPhoto($event)" 
              class="absolute left-4 md:left-10 top-1/2 -translate-y-1/2 w-14 h-14 bg-white/5 rounded-full flex items-center justify-center text-white text-5xl hover:bg-white/20 transition-all cursor-pointer z-10 group">
        <span class="group-hover:-translate-x-1.5 transition-transform">‹</span>
      </button>
      
      <button (click)="nextPhoto($event)" 
              class="absolute right-4 md:right-10 top-1/2 -translate-y-1/2 w-14 h-14 bg-white/5 rounded-full flex items-center justify-center text-white text-5xl hover:bg-white/20 transition-all cursor-pointer z-10 group">
        <span class="group-hover:translate-x-1.5 transition-transform">›</span>
      </button>

      <div class="relative w-full max-w-4xl aspect-video border-4 border-white rounded-sm shadow-2xl overflow-hidden bg-gray-900">
        <img [src]="currentPhoto().src" 
             [alt]="currentPhoto().alt" 
             class="w-full h-full object-cover object-center animate-fadein select-none">
      </div>
    </div>

    <div class="w-full bg-black/40 px-10 py-8 flex items-end justify-start select-none" (click)="$event.stopPropagation()">
      <div class="text-white max-w-4xl space-y-1.5">
        <p class="text-lg font-medium leading-relaxed drop-shadow-md">
          {{ currentPhoto().description }}
        </p>
        <p class="text-sm text-gray-400 font-mono tracking-widest opacity-80">
          {{ counterText() }}
        </p>
      </div>
    </div>
  </div>
}
