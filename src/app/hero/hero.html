
<div class="relative w-full h-[450px] overflow-hidden shadow-2xl group/carousel rounded-b-2xl">
  
  <div class="relative h-full w-full">
    
    @for (slide of slides(); track $index) {
      <div class="absolute inset-0 w-full h-full transition-opacity duration-1000 ease-in-out"
           [class.opacity-100]=" $index === currentIndex()"
           [class.opacity-0]=" $index !== currentIndex()"
           [class.z-10]=" $index === currentIndex()">
        
        <img [src]="slide.url" 
             class="absolute inset-0 w-full h-full object-cover transition-transform duration-[8000ms] ease-out"
             [class.scale-110]="$index === currentIndex()"
             [class.scale-100]="$index !== currentIndex()">
        
<div class="absolute inset-0 bg-slate-900/50 flex flex-col items-center justify-center p-6 md:p-16 text-white text-center">
  <div class="absolute inset-0 bg-linear-to-b from-black/40 via-transparent to-black/60"></div>  
  
  @if ($index === currentIndex()) {
    <div class="relative z-10 animate-in fade-in zoom-in-95 duration-1000 flex flex-col items-center w-full">
      
      <span class="text-xs md:text-sm font-bold tracking-widest uppercase mb-4 w-full max-w-2xl text-white px-2">
        {{ slide.sub }}
      </span>

      <div class="flex items-center justify-center gap-1 font-black italic tracking-tighter text-2xl md:text-4xl lg:text-5xl mb-8">
        <span class="bg-white text-orange-400 px-2 py-0.5 rounded-md not-italic shadow-sm">i</span>
        <span class="text-white uppercase">{{ slide.title }}</span>
        <span class="flex gap-0.5 items-end h-6 md:h-10">
          <span class="w-1 h-3 bg-orange-200 rounded-full animate-pulse"></span>
          <span class="w-1 h-4 bg-orange-300 rounded-full animate-pulse delay-75"></span>
          <span class="w-1 h-5 bg-orange-400 rounded-full animate-pulse delay-150"></span>
        </span>                
      </div>

      <div class="relative z-20"> 
        <button (click)="onStart()" 
          class="inline-block px-8 py-3 md:px-10 md:py-4 text-base md:text-lg font-bold text-white bg-orange-400 border border-orange-400 rounded-full no-underline transition-all duration-300 hover:bg-white hover:text-orange-400 hover:scale-105 shadow-lg shadow-orange-400/20 active:scale-95 cursor-pointer">
          Commencez
        </button>
      </div>
    </div>
  }
</div>
      </div>
    }
  </div>

  <div class="absolute inset-0 flex items-center justify-between px-6 pointer-events-none z-30">
    <button (click)="prev()" class="pointer-events-auto p-4 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white opacity-0 group-hover/carousel:opacity-100 transition-all duration-500 hover:bg-white/30 cursor-pointer">
      <i class="pi pi-chevron-left text-xl"></i>
    </button>
    <button (click)="next()" class="pointer-events-auto p-4 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white opacity-0 group-hover/carousel:opacity-100 transition-all duration-500 hover:bg-white/30 cursor-pointer">
      <i class="pi pi-chevron-right text-xl"></i>
    </button>
  </div>

  <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-3 z-30">
    @for (s of slides(); track $index; let i = $index) {
      <button (click)="goTo(i)" 
              class="h-1 w-10 transition-all duration-500 cursor-pointer overflow-hidden rounded-full relative bg-white/20">
        @if (i === currentIndex()) {
          <div class="absolute inset-0 bg-orange-400 animate-in slide-in-from-left duration-[6000ms] ease-linear"></div>
        }
      </button>
    }
  </div>

</div>
