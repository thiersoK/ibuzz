<section class="py-20 bg-linear-to-b from-gray-50 to-white flex flex-col items-center">
  
  <div appScrollReveal class="flex flex-col items-center text-center py-8">
    <h2 class="text-3xl font-black tracking-[0.2em] uppercase text-slate-900 mb-3">Citation</h2>
    <div class="relative w-40 h-[1px] bg-gray-200">
      <div class="absolute left-1/2 -translate-x-1/2 -top-[1.5px] h-[4px] w-12 bg-orange-400 rounded-full"></div>
    </div>
  </div>

  <div class="relative w-full overflow-hidden">
    
    <div class="flex transition-transform duration-700 ease-[cubic-bezier(0.23,1,0.32,1)]"
         [style.transform]="translateX()">
      
      @for (item of testimonials(); track $index) {
        <div class="w-full min-w-full flex-shrink-0 box-border flex flex-col items-center text-center px-4 sm:px-10">
          
          <div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-white shadow-2xl overflow-hidden mb-8">
            <img [src]="item.imageUrl" class="w-full h-full object-cover" alt="profile">
          </div>

          <h3 class="text-2xl md:text-3xl font-black text-slate-900 leading-tight">{{ item.name }}</h3>
          <p class="text-gray-400 font-bold uppercase tracking-widest mt-2 mb-10 text-xs md:text-sm">{{ item.role }}</p>

          <div class="relative w-full max-w-2xl px-6 md:px-10">
            <span class="absolute left-0 md:-left-4 -top-6 text-5xl md:text-7xl text-blue-100 font-serif select-none opacity-50">“</span>
            
            <p class="text-base sm:text-lg md:text-2xl text-gray-600 font-medium italic leading-relaxed">
              {{ item.quote }}
            </p>

            <span class="absolute right-0 md:-right-4 -bottom-10 text-5xl md:text-7xl text-blue-100 font-serif select-none opacity-50">”</span>
          </div>
          
        </div>
      }
    </div>
  </div>

  <div class="flex gap-4 mt-16 items-center">
    @for (t of testimonials(); track $index; let i = $index) {
      <button (click)="goTo(i)" 
              class="transition-all duration-500 cursor-pointer rounded-full"
              [class]="i === currentIndex() 
                        ? 'w-3 h-3 bg-orange-500 ring-4 ring-orange-500/20' 
                        : 'w-2 h-2 bg-gray-300 hover:bg-gray-400'">
      </button>
    }
  </div>

</section>
