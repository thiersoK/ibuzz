<section id="nos-chiffres" class="relative bg-white py-24 px-6 overflow-hidden">
  
  <div class="absolute inset-0 z-0 opacity-[0.05] pointer-events-none">
    <img src="salla_conf.avif" 
         alt="background decor" 
         class="w-full h-full object-cover object-center grayscale">
  </div>

  <div class="relative z-10 max-w-6xl mx-auto">
    
    <div appScrollReveal class="text-center mb-20 space-y-4">
      <div class="flex flex-col items-center gap-3">
        <h2 class="text-2xl font-black tracking-[0.2em] uppercase text-slate-900 mb-3">
          {{ title() }}
        </h2>
        <div class="relative w-40 h-[1px] bg-gray-200 mx-auto">
          <div class="absolute left-1/2 -translate-x-1/2 -top-[1.5px] h-[4px] w-12 bg-orange-400 rounded-full"></div>
        </div>        
      </div>
      
      <p class="text-slate-500 text-sm md:text-lg leading-relaxed max-w-2xl mx-auto font-medium">
        {{ subtitle() }}
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12 lg:gap-8">
        @for (stat of statsData; track stat.label; let i = $index) {
          <div appScrollReveal 
               class="flex flex-col items-center group bg-white/60 backdrop-blur-md p-8 rounded-3xl transition-all duration-500 hover:shadow-2xl hover:shadow-orange-200/40 border border-slate-50 hover:border-orange-100">
            
            <span class="text-6xl md:text-5xl font-black text-orange-400 tabular-nums tracking-tighter transition-transform duration-500 group-hover:scale-110">
              {{ formatNumber(stat.current()) }}
            </span>
            
            <div class="w-8 h-1.5 bg-orange-100 my-5 rounded-full group-hover:w-20 group-hover:bg-orange-400 transition-all duration-700"></div>
            
            <span class="text-slate-500 font-bold text-xs md:text-sm text-center uppercase tracking-[0.2em] leading-tight">
              {{ stat.label }}
            </span>
          </div>
        }
    </div>
  </div>
</section>
