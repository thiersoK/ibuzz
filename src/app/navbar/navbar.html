<nav class="fixed top-0 z-50 w-full bg-white shadow-md border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20 items-center">
      
      <div>
        <a routerLink="/" class="flex items-center gap-1 font-black italic tracking-tighter text-3xl">
          <span class="bg-orange-400 text-white px-2 py-0.5 rounded-md not-italic">i</span>
          <span class="text-orange-400 uppercase">Buzz</span>
          <span class="flex gap-0.5">
            <span class="w-1 h-3 bg-orange-200 rounded-full animate-pulse"></span>
            <span class="w-1 h-4 bg-orange-300 rounded-full animate-pulse delay-75"></span>
            <span class="w-1 h-5 bg-orange-400 rounded-full animate-pulse delay-150"></span>
          </span> 
        </a>      
      </div>

      <div class="hidden md:flex items-center gap-6">
        @for (item of navigationItems(); track item.label) {
          <a [routerLink]="['/']" 
             [fragment]="item.route" 
             [class.text-orange-400]="activeSection() === item.route"
             [class.text-gray-600]="activeSection() !== item.route"
             class="relative font-bold no-underline py-2 transition-all flex items-center gap-2 text-sm uppercase tracking-wide hover:text-orange-400 group">
            
            @if (item.icon) { <i class="pi {{ item.icon }} text-[10px]"></i> }
            {{ item.label }}

            <span [class.w-full]="activeSection() === item.route"
                  [class.w-0]="activeSection() !== item.route"
                  class="absolute bottom-0 left-0 h-0.5 bg-orange-400 transition-all duration-300">
            </span>
          </a>
        }
      </div>

      <button (click)="toggleMenu()" class="md:hidden p-2 text-orange-400">
        <i class="pi" [class]="isMenuOpen() ? 'pi-times' : 'pi-bars'" style="font-size: 1.5rem"></i>
      </button>

    </div>
  </div>

  @if (isMenuOpen()) {
    <div class="md:hidden bg-white border-t border-gray-100">
      <div class="px-4 pt-2 pb-6 space-y-1">
        @for (item of navigationItems(); track item.label) {
          <a [routerLink]="['/']" 
             [fragment]="item.route"
             (click)="isMenuOpen.set(false)"
             [class.bg-orange-50]="activeSection() === item.route"
             [class.text-orange-400]="activeSection() === item.route"
             [class.text-gray-700]="activeSection() !== item.route"
             class="block px-4 py-4 text-base font-bold rounded-xl no-underline transition-all">
             <div class="flex items-center gap-3">
               @if (item.icon) { <i class="pi {{ item.icon }}"></i> }
               {{ item.label }}
             </div>
          </a>
        }
      </div>
    </div>
  }
</nav>
